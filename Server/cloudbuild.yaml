steps:
  # 1. Собираем образ
  # Важно: последний аргумент 'Server' говорит Docker искать файлы внутри этой папки
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/vortex-back-server', 
      '-f', 'Server/Dockerfile', 
      'Server'
    ]

  # 2. Пушим образ в реестр
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vortex-back-server']

  # 3. Деплоим в Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vortex-back-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vortex-back-server'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Эта настройка убирает ошибку с логированием, которую мы видели ранее
options:
  logging: CLOUD_LOGGING_ONLY
